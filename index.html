<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SBR Estimates — Seattle Bathroom Remodeling LLC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy: #1B2B4B; --gold: #C9A84C; --cream: #F8F7F4; }
    body {
      font-family: 'Inter', sans-serif;
      background: #DDDBD4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.15);
      overflow: hidden;
      max-width: 560px;
      width: 100%;
    }
    .card-header {
      background: var(--navy);
      padding: 32px 36px;
      border-bottom: 4px solid var(--gold);
    }
    .card-header h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: white;
      font-size: 20px;
      font-weight: 800;
    }
    .card-header p {
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      margin-top: 4px;
    }
    .card-body { padding: 32px 36px; }
    .estimate-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: var(--cream);
      border: 1px solid #E8D5A0;
      border-radius: 6px;
      text-decoration: none;
      color: var(--navy);
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 12px;
    }
    .estimate-link:hover {
      border-color: var(--gold);
      box-shadow: 0 2px 12px rgba(201,168,76,0.2);
    }
    .el-left {}
    .el-address {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 15px;
    }
    .el-meta {
      font-size: 12px;
      color: #6B7280;
      margin-top: 3px;
    }
    .el-arrow {
      color: var(--gold);
      font-size: 20px;
    }
    .empty {
      text-align: center;
      color: #9CA3AF;
      font-size: 14px;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>SBR Estimates</h1>
      <p>Seattle Bathroom Remodeling LLC</p>
    </div>
    <div class="card-body">
      <a class="estimate-link" href="/13014-3rd-ave-nw/">
        <div class="el-left">
          <div class="el-address">13014 3rd Ave NW, Seattle WA 98177</div>
          <div class="el-meta">Josef &amp; Vivian Hi &nbsp;·&nbsp; #SBR-2026-001 &nbsp;·&nbsp; March 20, 2026</div>
        </div>
        <div class="el-arrow">→</div>
      </a>
    </div>
  </div>
</body>
</html>
